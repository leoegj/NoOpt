name: Build KernelSU Kernel Module (DDK)

on:
  workflow_dispatch:
    inputs:
      kmi:
        description: 'KMI version'
        required: true
        type: string
      ddk_release:
        description: 'DDK release version'
        required: false
        default: '20260313'
        type: string
  workflow_call:
    inputs:
      kmi:
        description: 'KMI version'
        required: true
        type: string
      ddk_release:
        description: 'DDK release version'
        required: false
        default: '20260313'
        type: string

jobs:
  build-noopt-ko:
    name: Build noopt.ko for ${{ inputs.kmi }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk-min:${{ inputs.kmi }}-${{ inputs.ddk_release }}
      options: --privileged

    steps:
    - name: Checkout source code
      uses: actions/checkout@v6

    - name: Build noopt.ko
      run: |
        cd kernel

        echo "=== Building noopt.ko for KMI: ${{ inputs.kmi }} ==="

        CONFIG_KSU=m CC=clang make

        echo "=== Build completed ==="

        # Copy with KMI-specific naming
        mkdir -p /github/workspace/out
        OUTPUT_NAME="${{ inputs.kmi }}_noopt.ko"
        cp noopt.ko "/github/workspace/out/$OUTPUT_NAME"

        echo "Copied to: /github/workspace/out/$OUTPUT_NAME"
        ls -la "/github/workspace/out/$OUTPUT_NAME"
        llvm-strip -d "/github/workspace/out/$OUTPUT_NAME"
        echo "Size after stripping: $(du -h "/github/workspace/out/$OUTPUT_NAME" | cut -f1)"

    - name: Upload noopt.ko artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.kmi }}-lkm
        path: /github/workspace/out/${{ inputs.kmi }}_noopt.ko
