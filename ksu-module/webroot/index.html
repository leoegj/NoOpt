<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>NoOpt</title>
	<link rel="stylesheet" href="./style.css">
</head>
<body>
	<header class="topbar">
		<div>
			<h1>NoOpt</h1>
			<p id="statusText"><span id="statusDot"></span> 正在加载...</p>
		</div>
		<div class="topbar-actions">
			<a href="javascript:void(0)" onclick="openExternal('https://github.com/Yon8/NoOpt')" class="github-link" title="Yon8/NoOpt: Hide /data/nohello LKM with DDK CI">
				<svg viewBox="0 0 16 16" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
			</a>
			<button id="refreshBtn" type="button">刷新</button>
		</div>
	</header>

	<main>
		<section class="panel">
			<div class="sectionTitle">
				<h2>隐藏路径</h2>
				<button id="addPathBtn" type="button">添加</button>
			</div>
			<div id="pathList" class="stack"></div>
		</section>

		<section class="panel">
			<div class="sectionTitle">
				<h2>作用范围</h2>
			</div>
			<div class="segmented">
				<label>
					<input type="radio" name="scope" value="global">
					<span>全局</span>
				</label>
				<label>
					<input type="radio" name="scope" value="deny">
					<span>黑名单</span>
				</label>
			</div>
			<label class="switchRow">
				<span>隐藏上级目录列表项</span>
				<input id="hideDirentsInput" type="checkbox">
			</label>
		</section>

		<section class="panel">
			<div class="sectionTitle">
				<h2>应用黑名单</h2>
				<div class="inlineControls">
					<label class="miniToggle">
						<input id="showSystemInput" type="checkbox">
						<span>系统应用</span>
					</label>
					<button id="loadAppsBtn" type="button">加载</button>
				</div>
			</div>
			<input id="searchInput" class="search" type="search" placeholder="搜索包名">
			<div id="appList" class="appList"></div>
		</section>

		<section class="panel">
			<div class="sectionTitle">
				<h2>直接填写 UID</h2>
			</div>
			<textarea id="denyUidsInput" rows="4" spellcheck="false" placeholder="每行一个 UID"></textarea>
		</section>
	</main>

	<footer class="actions">
		<button id="saveBtn" type="button">保存</button>
		<button id="reloadBtn" type="button">保存并重载</button>
	</footer>

	<div id="toast" class="toast" hidden></div>
	<script src="./app.js"></script>
</body>
</html>
